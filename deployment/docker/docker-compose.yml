name: batobuzz

# Secure default: SQLite, with only nginx bound to host loopback. The API has no
# host port, so it cannot bypass nginx. See docker-compose.postgres.yml for the
# explicit PostgreSQL opt-in.
services:
  api:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile
    restart: unless-stopped
    init: true
    read_only: true
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DatabaseProvider: Sqlite
      ConnectionStrings__DefaultConnection: "Data Source=/app/data/BatoBuzz.db;Cache=Shared"
      Authentication__SigningKey: "${API_SIGNING_KEY:?Set API_SIGNING_KEY to at least 32 bytes}"
      ReverseProxy__TrustForwardedHeaders: "true"
      HttpsRedirection__Enabled: "false"
    expose:
      - "8080"
    volumes:
      - type: bind
        source: ./data
        target: /app/data
      - type: bind
        source: ./logs
        target: /app/logs
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-8080}:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - backend

networks:
  backend:
    internal: true
